# ──────────────────────────────────────────────
# EthioBanksHub — Production Docker Compose
# ──────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml exec backup backup
#   docker compose -f docker-compose.prod.yml logs -f

name: ethiobankshub-prod

services:
  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: ethiobankshub-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080' # Internal health check port
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/letsencrypt:ro
      - ./nginx/www:/var/www/ethiobankshub:ro
      - nginx-cache:/var/cache/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'nginx', '-t']
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ethiobankshub-db
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432' # Localhost-only for security
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ethiobankshub}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-ethiobankshub}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ethiobankshub-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379' # Localhost-only for security
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
      - ./backups/redis:/backups
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  # ── API (NestJS) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: production
    container_name: ethiobankshub-api
    restart: unless-stopped
    ports:
      - '127.0.0.1:4000:4000' # Localhost-only; nginx proxies external
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ethiobankshub}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://ethiobankshub.com}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-https://ethiobankshub.com/api/v1/auth/google/callback}
      SCRAPER_ENABLED: ${SCRAPER_ENABLED:-true}
      SCRAPER_SCHEDULE_HOUR: ${SCRAPER_SCHEDULE_HOUR:-8}
      SCRAPER_SCHEDULE_MINUTE: ${SCRAPER_SCHEDULE_MINUTE:-30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4000/api/v1/health/live']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.25'
      # Scale for production
      replicas: ${API_REPLICAS:-2}
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ── Web (Next.js) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: production
    container_name: ethiobankshub-web
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000' # Localhost-only; nginx proxies external
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://ethiobankshub.com/api/v1
      NEXT_PUBLIC_APP_URL: https://ethiobankshub.com
      NEXT_PUBLIC_APP_NAME: EthioBanksHub
      NEXT_TELEMETRY_DISABLED: '1'
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
        reservations:
          memory: 256M
          cpus: '0.25'
      replicas: ${WEB_REPLICAS:-2}
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '5'

  # ── Backup Service (PostgreSQL + Redis) ────────────────────────
  backup:
    image: alpine:3.20
    container_name: ethiobankshub-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/usr/local/bin/backup:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ethiobankshub}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    entrypoint: |
      sh -c '
        apk add --no-cache postgresql-client redis aws-cli
        echo "0 3 * * * /usr/local/bin/backup" > /etc/crontabs/root
        crond -f -l 2
      '
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '2'

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nginx-cache:
    driver: local
