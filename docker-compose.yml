version: '3.9'

name: ethiobankshub

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ethiobankshub-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ethiobanks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethiobanks}
      POSTGRES_DB: ${POSTGRES_DB:-ethiobankshub}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ethiobanks} -d ${POSTGRES_DB:-ethiobankshub}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ethiobankshub-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (NestJS) ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
      target: ${NODE_ENV:-development}
    container_name: ethiobankshub-api
    restart: unless-stopped
    ports:
      - '${API_PORT:-4000}:4000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-ethiobanks}:${POSTGRES_PASSWORD:-ethiobanks}@postgres:5432/${POSTGRES_DB:-ethiobankshub}?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages

  # ── Web (Next.js) ───────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      target: ${NODE_ENV:-development}
    container_name: ethiobankshub-web
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-4000}/api/v1
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
