# ──────────────────────────────────────────────
# EthioBanksHub — Nginx Production Configuration
# ──────────────────────────────────────────────
# Optimized for performance, security, and Cloudflare compatibility
# Users:        nginx
# Worker:       auto (based on CPU cores)
# Connections:  1024 per worker

events {
  worker_connections 1024;
  multi_accept on;
  use epoll;
}

http {
  # ── Basic Settings ────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  server_tokens off;

  # ── MIME Types ────────────────────────────────────────────────
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ───────────────────────────────────────────────────
  log_format json escape=json '{'
    '"time_local":"$time_local",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"status":$status,'
    '"body_bytes_sent":$body_bytes_sent,'
    '"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"http_x_forwarded_for":"$http_x_forwarded_for"'
  '}';

  access_log /var/log/nginx/access.log json buffer=32k flush=5s;
  error_log /var/log/nginx/error.log warn;

  # ── Rate Limiting Zones ──────────────────────────────────────
  # 10MB shared memory zone = ~160,000 unique IPs
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=web:10m rate=100r/s;

  limit_req_status 429;
  limit_conn_status 429;

  # ── Proxy Settings ────────────────────────────────────────────
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-ID $request_id;
  proxy_buffering on;
  proxy_buffer_size 4k;
  proxy_buffers 8 16k;
  proxy_busy_buffers_size 32k;
  proxy_temp_file_write_size 64k;

  # ── Upstream Definitions ──────────────────────────────────────
  upstream api_backend {
    least_conn; # Load balance by least connections
    server api:4000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream web_backend {
    server web:3000 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  # ── Gzip / Compression ───────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/plain
    text/css
    text/xml
    text/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    application/manifest+json;

  # ── SSL (Let's Encrypt) ───────────────────────────────────────
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_session_tickets off;

  # SSL stapling
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 8.8.8.8 1.1.1.1 valid=300s;
  resolver_timeout 5s;

  # HSTS (also set in Next.js headers as a fallback)
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  # ── Server: Main ──────────────────────────────────────────────
  server {
    listen 80;
    listen [::]:80;
    server_name ethiobankshub.com www.ethiobankshub.com;
    return 301 https://$server_name$request_uri;
  }

  # ── Server: HTTPS ────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ethiobankshub.com www.ethiobankshub.com;

    # SSL certificates (managed by certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/ethiobankshub.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ethiobankshub.com/privkey.pem;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-DNS-Prefetch-Control "on" always;

    # Content Security Policy (matches Next.js config) — single-line for Nginx compliance
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://api.telegram.org; frame-src 'none'; object-src 'none'; upgrade-insecure-requests;" always;

    # ── Rate Limiting ─────────────────────────────────────────
    limit_req zone=web burst=20 nodelay;

    # ── Root ────────────────────────────────────────────────────
    root /var/www/ethiobankshub/current/web;
    index index.html;

    # ── Static Asset Caching ────────────────────────────────────
    location /_next/static {
      alias /var/www/ethiobankshub/current/web/.next/static;
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    location /static {
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    location /fonts {
      expires 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
      access_log off;
    }

    # ── Well-Known (Let's Encrypt, security.txt) ───────────────
    location ^~ /.well-known {
      allow all;
      root /var/www/ethiobankshub/current/web;
      try_files $uri =404;
    }

    # ── Favicon / Robots ────────────────────────────────────────
    location = /favicon.ico {
      access_log off;
      log_not_found off;
      expires max;
    }

    location = /robots.txt {
      access_log off;
      log_not_found off;
      expires 24h;
    }

    location = /sitemap.xml {
      access_log off;
      expires 24h;
    }

    # ── API Proxy ──────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=10 nodelay;

      proxy_pass http://api_backend;

      # Pass original client IP
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Real-IP $remote_addr;

      # Disable buffering for SSE/streaming
      proxy_buffering off;

      # Timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout 30s;
      proxy_read_timeout 30s;

      # CORS headers (when nginx handles cross-origin)
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token, X-Request-ID" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Max-Age "86400" always;

      # Handle preflight
      if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin $http_origin;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-CSRF-Token, X-Request-ID";
        add_header Access-Control-Allow-Credentials "true";
        add_header Access-Control-Max-Age "86400";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
      }
    }

    # ── Health Checks (no rate limit) ──────────────────────────
    location /health {
      limit_req zone=web burst=50 nodelay;
      proxy_pass http://api_backend/health;
      proxy_connect_timeout 5s;
      proxy_read_timeout 10s;
      access_log off;
    }

    # ── Web Proxy (React SPA) ─────────────────────────────────
    location / {
      # Rate limiting for web
      limit_req zone=web burst=30 nodelay;

      proxy_pass http://web_backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;

      # Timeouts
      proxy_connect_timeout 10s;
      proxy_send_timeout 60s;
      proxy_read_timeout 60s;

      # Error fallback
      proxy_intercept_errors on;
      recursive_error_pages on;
      error_page 502 503 504 /maintenance.html;
    }

    # ── Maintenance Page ────────────────────────────────────────
    location = /maintenance.html {
      root /var/www/ethiobankshub/current/web;
      internal;
    }
  }

  # ── Server: Internal Health (Docker healthcheck) ────────────
  server {
    listen 8080;
    location / {
      access_log off;
      add_header Content-Type application/json;
      return 200 '{"status":"healthy"}';
    }
  }
}
